<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="920" height="560" viewBox="0 0 920 560">
  <defs>
    <style>
      .uc { font: 11px Arial, sans-serif; fill: #0f172a; }
      .actor { font: bold 12px Arial, sans-serif; fill: #0f172a; }
      .cap { font: bold 14px Arial, sans-serif; fill: #0f172a; }
    </style>
  </defs>
  <rect width="920" height="560" fill="#fff"/>
  <rect x="280" y="30" width="360" height="470" rx="12" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="460" y="55" text-anchor="middle" class="actor">TrafikPuls System</text>
  <!-- Passenger actor -->
  <circle cx="80" cy="120" r="18" fill="none" stroke="#334155" stroke-width="2"/>
  <line x1="80" y1="138" x2="80" y2="200" stroke="#334155" stroke-width="2"/>
  <line x1="50" y1="165" x2="110" y2="165" stroke="#334155" stroke-width="2"/>
  <line x1="80" y1="200" x2="55" y2="250" stroke="#334155" stroke-width="2"/>
  <line x1="80" y1="200" x2="105" y2="250" stroke="#334155" stroke-width="2"/>
  <text x="80" y="275" text-anchor="middle" class="actor">Passenger</text>
  <!-- Admin actor -->
  <circle cx="80" cy="380" r="18" fill="none" stroke="#334155" stroke-width="2"/>
  <line x1="80" y1="398" x2="80" y2="455" stroke="#334155" stroke-width="2"/>
  <line x1="50" y1="420" x2="110" y2="420" stroke="#334155" stroke-width="2"/>
  <line x1="80" y1="455" x2="55" y2="500" stroke="#334155" stroke-width="2"/>
  <line x1="80" y1="455" x2="105" y2="500" stroke="#334155" stroke-width="2"/>
  <text x="80" y="525" text-anchor="middle" class="actor">Admin</text>
  <!-- Use cases -->
  <ellipse cx="380" cy="95" rx="95" ry="28" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="380" y="99" text-anchor="middle" class="uc">Register / Login</text>
  <ellipse cx="520" cy="95" rx="85" ry="28" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="520" y="99" text-anchor="middle" class="uc">Manage Profile</text>
  <ellipse cx="450" cy="155" rx="100" ry="28" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="450" y="159" text-anchor="middle" class="uc">Search &amp; Select Route</text>
  <ellipse cx="380" cy="215" rx="95" ry="28" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="380" y="219" text-anchor="middle" class="uc">View Density Prediction</text>
  <ellipse cx="540" cy="215" rx="88" ry="28" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="540" y="219" text-anchor="middle" class="uc">View Stops &amp; ETA</text>
  <ellipse cx="450" cy="275" rx="105" ry="28" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="450" y="279" text-anchor="middle" class="uc">View Forecast (30/60 min)</text>
  <ellipse cx="380" cy="335" rx="95" ry="28" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="380" y="339" text-anchor="middle" class="uc">Submit Feedback</text>
  <ellipse cx="540" cy="335" rx="88" ry="28" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="540" y="339" text-anchor="middle" class="uc">Receive Alerts</text>
  <ellipse cx="450" cy="395" rx="100" ry="28" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="450" y="399" text-anchor="middle" class="uc">View Incidents &amp; Alternatives</text>
  <ellipse cx="450" cy="455" rx="95" ry="28" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="450" y="459" text-anchor="middle" class="uc">Monitor System (Admin)</text>
  <!-- Associations -->
  <line x1="110" y1="120" x2="285" y2="95" stroke="#64748b" stroke-width="1.2"/>
  <line x1="110" y1="130" x2="285" y2="155" stroke="#64748b" stroke-width="1.2"/>
  <line x1="110" y1="140" x2="285" y2="215" stroke="#64748b" stroke-width="1.2"/>
  <line x1="110" y1="150" x2="285" y2="335" stroke="#64748b" stroke-width="1.2"/>
  <line x1="110" y1="380" x2="285" y2="455" stroke="#64748b" stroke-width="1.2"/>
  <line x1="110" y1="160" x2="450" y2="275" stroke="#64748b" stroke-width="1.2"/>
  <text x="460" y="540" text-anchor="middle" class="cap">Figure 7.2 - Use case diagram of TrafikPuls</text>
</svg>
