  <text x="230" y="278" class="lbl">predictions,</text>
  <text x="230" y="291" class="lbl">alerts</text>
  <line x1="560" y1="220" x2="730" y2="95" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
