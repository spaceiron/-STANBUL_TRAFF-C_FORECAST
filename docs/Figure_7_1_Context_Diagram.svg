  <text x="105" y="242" text-anchor="middle" class="ent">Passenger</text>
  <text x="105" y="260" text-anchor="middle" class="lbl">(User)</text>
  <rect x="730" y="60" width="130" height="70" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
