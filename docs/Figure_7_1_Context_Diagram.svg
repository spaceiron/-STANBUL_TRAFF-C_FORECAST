  <text x="795" y="250" text-anchor="middle" class="lbl">+ ML Engine</text>
  <rect x="730" y="340" width="130" height="70" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="795" y="372" text-anchor="middle" class="ent">IBB Open Data</text>
