  <text x="220" y="360" class="lbl">monitor /</text>
  <text x="220" y="373" class="lbl">admin ops</text>
  <text x="450" y="500" text-anchor="middle" class="cap">Figure 7.1 - Context diagram of TrafikPuls</text>
