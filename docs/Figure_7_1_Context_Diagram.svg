      .sys { font: bold 14px Arial, sans-serif; fill: #1e3a8a; }
    </style>
  </defs>
  <rect width="900" height="520" fill="#fff"/>
  <circle cx="450" cy="260" r="110" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="252" text-anchor="middle" class="sys">TrafikPuls</text>
