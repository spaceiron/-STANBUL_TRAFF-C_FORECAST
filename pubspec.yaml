name: istanbul_traffic_forecast
description: Real-time traffic and public transport density forecast for Istanbul.

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1

  google_maps_flutter: ^2.9.0

  http: ^1.2.2

  geolocator: ^13.0.1
  permission_handler: ^11.3.1

  fl_chart: ^0.69.0

  intl: ^0.19.0
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true